<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Chatbot</title>

    <style>
        :root{
          --bg:#0b0b0b;
          --border:#2a2a2a;
          --text:#ffffff;
          --muted:#aaaaaa;
        }

        *{
          margin:0;
          padding:0;
          box-sizing:border-box;
          font-family:Inter,system-ui,sans-serif;
        }

        body{
          background:var(--bg);
          color:#fff;
          height:100vh;
          overflow:hidden;
        }

        .container{
          max-width:950px;
          margin:auto;
          height:100vh;
          display:flex;
          flex-direction:column;
        }

        /* header */
        .header{
          padding:18px 20px;
          border-bottom:1px solid var(--border);
          display:flex;
          justify-content:space-between;
          align-items:center;
        }

        .header h1{
          font-size:24px;
        }

        .logout{
          background:none;
          color:#fff;
          border:1px solid var(--border);
          padding:10px 14px;
          border-radius:12px;
          cursor:pointer;
        }

        /* upload */
        .upload-box{
          margin:18px;
          border:2px dashed #3a3a3a;
          border-radius:16px;
          padding:24px;
          text-align:center;
          cursor:pointer;
        }

        .upload-box:hover{
          border-color:#fff;
        }

        .upload-box input{
          display:none;
        }

        .upload-box p{
          color:var(--muted);
          margin-top:8px;
        }

        .file-chip{
          margin:0 18px 10px;
          background:#fff;
          color:#000;
          padding:12px 14px;
          border-radius:12px;
          display:flex;
          justify-content:space-between;
        }

        /* chat */
        .chat{
          flex:1;
          overflow-y:auto;
          padding:10px 18px 130px;
          scroll-behavior:smooth;
        }

        .msg{
          max-width:82%;
          padding:16px 18px;
          border-radius:18px;
          margin-bottom:14px;
          line-height:1.6;
          white-space:pre-wrap;
        }

        .user{
          margin-left:auto;
          background:#fff;
          color:#000;
        }

        .ai{
          background:#1d1d1d;
          border:1px solid #2a2a2a;
        }

        /* spinner no box */
        .center-loader{
          display:flex;
          justify-content:center;
          align-items:center;
          margin:20px 0;
        }

        .spinner{
          width:36px;
          height:36px;
          border:4px solid #333;
          border-top:4px solid #fff;
          border-radius:50%;
          animation:spin .8s linear infinite;
        }

        @keyframes spin{
          to{transform:rotate(360deg);}
        }

        /* bottom */
        .bottom-box{
          position:fixed;
          left:0;
          right:0;
          bottom:0;
          background:#0b0b0b;
          border-top:1px solid var(--border);
          padding:14px;
        }

        .bottom-inner{
          max-width:950px;
          margin:auto;
          display:flex;
          gap:10px;
        }

        .bottom-inner input{
          flex:1;
          background:#1a1a1a;
          border:1px solid #2a2a2a;
          color:#fff;
          padding:16px;
          border-radius:14px;
          outline:none;
        }

        .bottom-inner button{
          background:#fff;
          color:#000;
          border:none;
          padding:0 22px;
          border-radius:14px;
          cursor:pointer;
          font-weight:600;
        }

        @media(max-width:700px){
         .msg{max-width:100%;}
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🤖 AI PDF Chatbot</h1>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <label class="upload-box">
        <input type="file" id="pdf" accept="application/pdf" onchange="showFile()">
        <h3>Upload PDF</h3>
        <p>Click or drop your PDF here</p>
    </label>

    <div id="filePreview"></div>

    <div class="chat" id="chat"></div>

</div>

<div class="bottom-box">
    <div class="bottom-inner">
        <input type="text" id="question" placeholder="Ask anything from your PDF...">
        <button onclick="askQuestion()">Send</button>
    </div>
</div>

<script>

    const chat=document.getElementById("chat");

    /* auth */
    fetch("/auth/status")
    .then(r=>r.json())
    .then(d=>{
     if(!d.role || d.role==="NOT_LOGGED_IN"){
       location.href="/register.html";
     }
    });

    /* file preview */
    function showFile(){
     const file=document.getElementById("pdf").files[0];
     const box=document.getElementById("filePreview");

     if(!file){
       box.innerHTML="";
       return;
     }

     box.innerHTML=`
     <div class="file-chip">
       <span>${file.name}</span>
       <span style="cursor:pointer" onclick="removeFile()">✕</span>
     </div>`;
    }

    function removeFile(){
     document.getElementById("pdf").value="";
     document.getElementById("filePreview").innerHTML="";
    }

    /* messages */
    function addUser(text){
     chat.innerHTML += `<div class="msg user">${text}</div>`;
     scrollBottom();
    }

    function addBot(text){
     chat.innerHTML += `<div class="msg ai">${text}</div>`;
     scrollBottom();
    }

    function scrollBottom(){
     setTimeout(()=>{
       chat.scrollTop=chat.scrollHeight;
     },100);
    }

    /* spinner without box */
    function showThinking(){
     chat.innerHTML += `
     <div id="typingLoader" class="center-loader">
       <div class="spinner"></div>
     </div>`;
     scrollBottom();
    }

    function hideThinking(){
     const loader=document.getElementById("typingLoader");
     if(loader) loader.remove();
    }

    /* ask */
    async function askQuestion(){

     const file=document.getElementById("pdf").files[0];
     const q=document.getElementById("question").value.trim();

     if(!file){
       alert("Upload PDF first");
       return;
     }

     if(q==="") return;

     addUser(q);
     document.getElementById("question").value="";

     showThinking();

     const fd=new FormData();
     fd.append("file",file);
     fd.append("question",q);

     try{
       const res=await fetch("/ai/ask",{
         method:"POST",
         body:fd
       });

       const data=await res.json();

       hideThinking();
       addBot(data.answer || "No answer found");
     }
     catch{
       hideThinking();
       addBot("❌ Failed to get answer");
     }
    }

    document.getElementById("question")
    .addEventListener("keypress",function(e){
     if(e.key==="Enter"){
       askQuestion();
     }
    });

    function logout(){
     location.href="/register.html";
    }

</script>

</body>
</html>
