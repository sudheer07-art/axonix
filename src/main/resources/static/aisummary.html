<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Chatbot</title>

    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
        }

        body{
        background:#000;
        color:#fff;
        }

        .container{
        width:90%;
        max-width:1100px;
        margin:auto;
        padding:30px 0;
        }

        header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        }

        header h1{
        font-size:38px;
        }

        .logout-btn{
        padding:12px 22px;
        background:#111;
        color:#fff;
        border:1px solid #333;
        border-radius:12px;
        cursor:pointer;
        }

        .upload-box{
        border:2px dashed #333;
        border-radius:20px;
        padding:50px;
        text-align:center;
        margin-bottom:25px;
        cursor:pointer;
        }

        .quick-actions{
        display:flex;
        gap:12px;
        flex-wrap:wrap;
        justify-content:center;
        margin-bottom:25px;
        }

        .quick-actions button{
        background:#111;
        color:#fff;
        border:1px solid #333;
        padding:12px 18px;
        border-radius:30px;
        cursor:pointer;
        }

        .chat-box{
        min-height:380px;
        background:#050505;
        border:1px solid #222;
        border-radius:18px;
        padding:25px;
        display:flex;
        flex-direction:column;
        gap:15px;
        overflow-y:auto;
        margin-bottom:20px;
        }

        .message{
        max-width:75%;
        padding:16px;
        border-radius:18px;
        position:relative;
        line-height:1.7;
        }

        .bot{
        align-self:flex-start;
        background:#111;
        border-left:4px solid #fff;
        }

        .user{
        align-self:flex-end;
        background:#0f2946;
        border-right:4px solid #4da3ff;
        }

        .message-text{
        padding-right:60px;
        }

        .actions{
        position:absolute;
        right:10px;
        top:10px;
        display:flex;
        gap:8px;
        }

        .icon-btn{
        background:none;
        border:none;
        color:#bbb;
        cursor:pointer;
        font-size:16px;
        }

        .icon-btn:hover{
        color:#fff;
        }

        /* reply preview */
        .reply-box{
        display:none;
        background:#111;
        border-left:4px solid #4da3ff;
        padding:12px 15px;
        border-radius:12px;
        margin-bottom:10px;
        position:relative;
        }

        .reply-box small{
        color:#4da3ff;
        display:block;
        margin-bottom:5px;
        }

        .reply-close{
        position:absolute;
        right:10px;
        top:8px;
        cursor:pointer;
        color:#999;
        font-size:18px;
        }

        .bottom-bar{
        display:flex;
        gap:15px;
        }

        .bottom-bar input{
        flex:1;
        padding:18px;
        border:none;
        outline:none;
        border-radius:15px;
        background:#111;
        color:#fff;
        font-size:16px;
        }

        .bottom-bar button{
        width:140px;
        border:none;
        border-radius:15px;
        background:#fff;
        color:#000;
        font-size:18px;
        font-weight:bold;
        cursor:pointer;
        }

        .spinner{
        width:42px;
        height:42px;
        border:4px solid #222;
        border-top:4px solid #fff;
        border-radius:50%;
        animation:spin 1s linear infinite;
        display:none;
        margin:auto;
        }

        @keyframes spin{
        100%{transform:rotate(360deg);}
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        <h1>🤖 AI PDF Chatbot</h1>
        <button class="logout-btn">Logout</button>
    </header>

    <div class="upload-box">
        <h2>Upload PDF</h2>
        <p>Click or drop your PDF here</p>
    </div>

    <div class="quick-actions">
        <button onclick="quickAsk('Summarize this PDF')">📄 Summarize</button>
        <button onclick="quickAsk('Important points')">⭐ Important</button>
        <button onclick="quickAsk('Create notes')">📝 Notes</button>
        <button onclick="quickAsk('Explain simply')">🧠 Explain</button>
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            <div class="message-text">Hello 👋 Upload a PDF and ask anything.</div>
            <div class="actions">
                <button class="icon-btn" onclick="copyText(this)">📋</button>
                <button class="icon-btn" onclick="setReply('Hello 👋 Upload a PDF and ask anything.')">↩️</button>
            </div>
        </div>

        <div class="spinner" id="spinner"></div>

    </div>

    <!-- Reply Preview -->
    <div class="reply-box" id="replyBox">
        <span class="reply-close" onclick="closeReply()">✖</span>
        <small>Replying to</small>
        <div id="replyText"></div>
    </div>

    <div class="bottom-bar">
        <input type="text" id="questionInput" placeholder="Ask anything from your PDF...">
        <button onclick="askQuestion()">Send</button>
    </div>

</div>

<script>
    let currentReply = "";

    function quickAsk(text){
    document.getElementById("questionInput").value=text;
    askQuestion();
    }

    function setReply(text){
    currentReply = text;
    document.getElementById("replyText").innerText = text;
    document.getElementById("replyBox").style.display = "block";
    document.getElementById("questionInput").focus();
    }

    function closeReply(){
    currentReply = "";
    document.getElementById("replyBox").style.display = "none";
    }

    function askQuestion(){

    let input=document.getElementById("questionInput");
    let question=input.value.trim();
    if(question==="") return;

    let chatBox=document.getElementById("chatBox");
    let spinner=document.getElementById("spinner");

    let replyHtml = "";
    if(currentReply!==""){
    replyHtml = "<div style='font-size:13px;color:#9ecbff;margin-bottom:8px;'>↩️ Reply to: "+currentReply+"</div>";
    }

    chatBox.innerHTML += `
    <div class="message user">
    <div class="message-text">
    ${replyHtml}
    <b>You:</b> ${question}
    </div>
    <div class="actions">
    <button class="icon-btn" onclick="copyText(this)">📋</button>
    <button class="icon-btn" onclick="setReply('${question}')">↩️</button>
    </div>
    </div>
    `;

    input.value="";
    closeReply();

    spinner.style.display="block";
    chatBox.scrollTop=chatBox.scrollHeight;

    setTimeout(()=>{

    spinner.style.display="none";

    chatBox.innerHTML += `
    <div class="message bot">
    <div class="message-text"><b>AI:</b> This is AI response for: ${question}</div>
    <div class="actions">
    <button class="icon-btn" onclick="copyText(this)">📋</button>
    <button class="icon-btn" onclick="setReply('${question}')">↩️</button>
    </div>
    </div>
    `;

    chatBox.scrollTop=chatBox.scrollHeight;

    },1000);
    }

    function copyText(btn){
    let text=btn.parentElement.parentElement.querySelector(".message-text").innerText;
    navigator.clipboard.writeText(text);
    btn.innerHTML="✅";
    setTimeout(()=>btn.innerHTML="📋",1000);
    }

    document.getElementById("questionInput").addEventListener("keypress",function(e){
    if(e.key==="Enter") askQuestion();
    });
</script>

</body>
</html>
