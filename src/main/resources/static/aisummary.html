<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Chatbot</title>

    <style>
        :root{
         --bg:#0b0b0b;
         --card:#151515;
         --border:#2a2a2a;
         --text:#fff;
         --muted:#aaa;
        }

        *{
         margin:0;
         padding:0;
         box-sizing:border-box;
         font-family:Inter,system-ui,sans-serif;
        }

        body{
         background:var(--bg);
         color:#fff;
         height:100vh;
         overflow:hidden;
        }

        .container{
         max-width:950px;
         margin:auto;
         height:100vh;
         display:flex;
         flex-direction:column;
        }

        .header{
         padding:18px 20px;
         border-bottom:1px solid var(--border);
         display:flex;
         justify-content:space-between;
         align-items:center;
        }

        .header h1{
         font-size:24px;
        }

        .logout{
         background:none;
         border:1px solid var(--border);
         color:#fff;
         padding:10px 14px;
         border-radius:10px;
         cursor:pointer;
        }

        .chat-area{
         flex:1;
         overflow-y:auto;
         padding:25px 18px 120px;
         scroll-behavior:smooth;
        }

        .msg{
         max-width:80%;
         padding:16px 18px;
         border-radius:18px;
         margin-bottom:14px;
         line-height:1.6;
         white-space:pre-wrap;
        }

        .user{
         margin-left:auto;
         background:#fff;
         color:#000;
        }

        .ai{
         background:#1d1d1d;
         border:1px solid var(--border);
        }

        .upload-box{
         margin:20px;
         border:2px dashed #3a3a3a;
         border-radius:16px;
         padding:25px;
         text-align:center;
         cursor:pointer;
        }

        .upload-box:hover{
         border-color:#fff;
        }

        .upload-box input{
         display:none;
        }

        .file-chip{
         margin:15px 20px;
         background:#fff;
         color:#000;
         padding:12px 14px;
         border-radius:12px;
         display:flex;
         justify-content:space-between;
        }

        .bottom-box{
         position:fixed;
         bottom:0;
         left:0;
         right:0;
         background:#0b0b0b;
         border-top:1px solid var(--border);
         padding:16px;
        }

        .bottom-inner{
         max-width:950px;
         margin:auto;
         display:flex;
         gap:10px;
        }

        .bottom-inner input{
         flex:1;
         background:#1a1a1a;
         border:1px solid var(--border);
         color:#fff;
         padding:16px;
         border-radius:14px;
         outline:none;
         font-size:15px;
        }

        .bottom-inner button{
         background:#fff;
         color:#000;
         border:none;
         padding:0 22px;
         border-radius:14px;
         cursor:pointer;
         font-weight:600;
        }

        .loader{
         width:32px;
         height:32px;
         border:4px solid #333;
         border-top:4px solid #fff;
         border-radius:50%;
         animation:spin 1s linear infinite;
         margin:18px auto;
         display:none;
        }

        @keyframes spin{
         to{transform:rotate(360deg);}
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🤖 AI PDF Chatbot</h1>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <label class="upload-box">
        <input type="file" id="pdf" accept="application/pdf" onchange="showFile()">
        <h3>Upload PDF</h3>
        <p style="color:#aaa;margin-top:8px;">Click or drop PDF here</p>
    </label>

    <div id="filePreview"></div>

    <div class="chat-area" id="chat">
    </div>

    <div class="loader" id="loader"></div>

</div>

<!-- bottom input -->
<div class="bottom-box">
    <div class="bottom-inner">
        <input type="text" id="question" placeholder="Ask anything from your PDF...">
        <button onclick="askQuestion()">Send</button>
    </div>
</div>

<script>

    function showFile(){
     const file=document.getElementById("pdf").files[0];
     const box=document.getElementById("filePreview");

     if(!file){
       box.innerHTML="";
       return;
     }

     box.innerHTML=`
     <div class="file-chip">
       <span>${file.name}</span>
       <span style="cursor:pointer" onclick="removeFile()">✕</span>
     </div>`;
    }

    function removeFile(){
     document.getElementById("pdf").value="";
     document.getElementById("filePreview").innerHTML="";
    }

    function addUser(text){
     document.getElementById("chat").innerHTML +=
     `<div class="msg user">${text}</div>`;
     scrollBottom();
    }

    function addBot(text){
     document.getElementById("chat").innerHTML +=
     `<div class="msg ai">${text}</div>`;
     scrollBottom();
    }

    function scrollBottom(){
     const chat=document.getElementById("chat");
     setTimeout(()=>{
       chat.scrollTop=chat.scrollHeight;
     },100);
    }

    function loading(show){
     document.getElementById("loader").style.display=
     show ? "block":"none";
     scrollBottom();
    }

    async function askQuestion(){

     const file=document.getElementById("pdf").files[0];
     const q=document.getElementById("question").value.trim();

     if(!file){
       alert("Upload PDF first");
       return;
     }

     if(q===""){
       return;
     }

     addUser(q);
     document.getElementById("question").value="";
     loading(true);

     const fd=new FormData();
     fd.append("file",file);
     fd.append("question",q);

     try{
       const res=await fetch("/ai/ask",{
         method:"POST",
         body:fd
       });

       const data=await res.json();
       addBot(data.answer || "No answer found");
     }
     catch{
       addBot("❌ Failed to get answer");
     }

     loading(false);
    }

    document.getElementById("question")
    .addEventListener("keypress",function(e){
     if(e.key==="Enter"){
       askQuestion();
     }
    });

    function logout(){
     location.href="/register.html";
    }

</script>

</body>
